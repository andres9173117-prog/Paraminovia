<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi reina ✨</title>
    <style>
        :root {
            --rosa-fuerte: #ff4d6d;
            --rosa-claro: #ffb3c1;
            --dorado: #ffd700;
            --oscuro: #1a0a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #2d0a1a 0%, #1a0a1a 100%);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estrellas parpadeantes */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Contenedor de la carta */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid rgba(255, 179, 193, 0.3);
            box-shadow: 0 0 50px rgba(255, 77, 109, 0.2);
            max-width: 85%;
            animation: floatCard 4s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            color: var(--rosa-claro);
            font-size: 2.5rem;
            text-shadow: 0 0 10px var(--rosa-fuerte);
            margin-bottom: 20px;
        }

        p {
            color: white;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .boton-magico {
            background: var(--rosa-fuerte);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }

        .boton-magico:hover {
            transform: scale(1.1);
            background: #ff758f;
            box-shadow: 0 0 25px var(--rosa-fuerte);
        }

        /* Elementos flotantes (Corazones y Flores) */
        .floating {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            animation: rise var(--duration) linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="musica" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/And-So-It-Begins-Inspired-By-Crush-Piano-Melody.mp3" type="audio/mpeg">
    </audio>

    <div id="stars"></div>
    <div id="floating-elements"></div>

    <div class="container">
        <h1>Para la mujer de mi vida ❤️</h1>
        <p>Desde que llegaste, mi mundo brilla más que todas estas estrellas juntas. Gracias por ser mi calma y mi alegría.</p>
        <button class="boton-magico" onclick="activarTodo()">Tócame ✨</button>
    </div>

    <script>
        // Crear estrellas
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }

        // Crear corazones y flores flotantes
        const elementsContainer = document.getElementById('floating-elements');
        const icons = ['❤️', '🌸', '✨', '🌹', '💖', '🌷'];

        function createFloating() {
            const el = document.createElement('div');
            el.className = 'floating';
            el.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = Math.random() * 20 + 15 + 'px';
            el.style.setProperty('--duration', Math.random() * 5 + 5 + 's');
            elementsContainer.appendChild(el);

            setTimeout(() => el.remove(), 10000);
        }

        setInterval(createFloating, 500);

        function activarTodo() {
            // Reproducir música
            const audio = document.getElementById('musica');
            audio.play();

            // Mensaje especial
            alert("Te amo muchísimo. Gracias por estar conmigo 🌹");
        }
    </script>
</body>
</html>
