<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi persona favorita</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffb3c1;
            --bg: #fff0f3;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Fondo animado de corazones */
        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .heart {
            position: absolute;
            list-style: none;
            display: block;
            width: 20px;
            height: 20px;
            background: var(--primary);
            animation: animate 25s linear infinite;
            bottom: -150px;
            opacity: 0.3;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
        }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        /* Tarjeta principal */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            z-index: 1;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 2s ease-in;
        }

        h1 { color: var(--primary); margin-bottom: 1rem; }
        p { color: #555; line-height: 1.6; font-size: 1.1rem; }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s;
            display: inline-block;
            margin-top: 1.5rem;
        }

        .btn:hover { transform: scale(1.1); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hearts" id="heartsContainer"></div>

    <div class="card">
        <h1>Para carla ❤️</h1>
        <p>Eres la casualidad más bonita que me ha pasado. Gracias por cada sonrisa, por cada momento y por ser tú.</p>
        <p><i>"En un mundo lleno de gente, mis ojos siempre te buscan a ti."</i></p>
        <button class="btn" onclick="lanzarConfeti()">¡Te quiero!</button>
    </div>

    <script>
        // Generador de corazones en el fondo
        const container = document.getElementById('heartsContainer');
        for (let i = 0; i < 15; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 20 + 's';
            heart.style.animationDuration = (Math.random() * 10 + 10) + 's';
            container.appendChild(heart);
        }

        function lanzarConfeti() {
            alert("¡Eres lo mejor que me ha pasado! ✨");
        }
    </script>
</body>
</html>
